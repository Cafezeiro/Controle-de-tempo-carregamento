<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cadastro de Veículos (Online)</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,Segoe UI,Arial;
  background:linear-gradient(135deg,#667eea,#764ba2);
  min-height:100vh;
  padding:20px;
  display:flex;
  justify-content:center;
}
.container{
  width:100%;
  max-width:980px;
  background:#fff;
  border-radius:20px;
  padding:26px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.header{text-align:center;margin-bottom:16px}
.header h2{font-size:26px}
.tabs{
  display:flex; gap:10px; margin:18px 0 20px;
}
.tabs button{
  flex:1; padding:12px; border:none; border-radius:12px;
  font-weight:700; cursor:pointer; background:#e5e7eb;
}
.tabs button.active{background:#667eea;color:#fff}
section{display:none}
section.active{display:block}
label{display:block;font-weight:700;margin:10px 0 6px}
input,select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:2px solid #e2e8f0;
}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
@media (max-width:720px){ .row{grid-template-columns:1fr} }

.button-group{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:18px;
}
button{
  padding:14px;
  border-radius:12px;
  border:none;
  font-weight:800;
  cursor:pointer;
}
.normal{background:#16a34a;color:#fff}
.ofr{background:#dc2626;color:#fff}
.secondary{
  background:#0f172a; color:#fff;
}
.small-actions{
  display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;
}
.small-actions button{
  padding:10px 12px;
  border-radius:12px;
  font-weight:800;
}
table{width:100%; border-collapse:collapse; margin-top:10px}
th,td{padding:10px; border-bottom:1px solid #e5e7eb; text-align:center}
th{background:#f1f5f9}
.remove{background:#dc2626;color:#fff;padding:6px 10px;border-radius:8px}
.move{background:#2563eb;color:#fff;padding:6px 10px;border-radius:8px}
.toast{
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%) translateY(100px);
  background:#16a34a; color:#fff;
  padding:14px 18px; border-radius:12px;
  opacity:0; transition:.25s;
}
.toast.show{opacity:1; transform:translateX(-50%)}
.toast.error{background:#dc2626}
.note{
  margin-top:16px;
  font-size:13px;
  background:#fff7ed;
  border:1px solid #fed7aa;
  color:#7c2d12;
  padding:10px 12px;
  border-radius:12px;
}
</style>
</head>

<body>
<div class="container">
  <div class="header">
    <h2>Cadastro de Veículos (Online)</h2>
    <div style="margin-top:8px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
      <a href="index.html" style="text-decoration:none;font-weight:800;color:#1d4ed8;">⬅ Voltar ao Início</a>
      <a href="Painel.html?area=Trefila%201" style="text-decoration:none;font-weight:800;color:#1d4ed8;">Abrir um Painel</a>
    </div>
  </div>

  <div class="tabs">
    <button class="active" onclick="openTab(event,'cadastro')">Cadastro</button>
    <button onclick="openTab(event,'gerenciar')">Gerenciar</button>
  </div>

  <section id="cadastro" class="active">
    <div class="row">
      <div>
        <label>Área</label>
        <select id="area">
          <option value="">Selecione a área</option>
          <option value="Trefila 1">Trefila 1</option>
          <option value="Pepa 1/2">Pepa 1/2</option>
          <option value="Trefila 2">Trefila 2</option>
          <option value="L3">L3</option>
          <option value="FAP">FAP</option>
          <option value="Galpão de lona">Galpão de lona</option>
          <option value="P. Bobinas">P. Bobinas</option>
        </select>
      </div>
      <div>
        <label>Transporte</label>
        <input id="transporte" type="number" placeholder="Ex: 12345">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Placa</label>
        <input id="placa" style="text-transform:uppercase" placeholder="ABC1D23">
      </div>
      <div>
        <label>Tipo</label>
        <select id="tipo">
          <option value="Normal">Normal</option>
          <option value="OFR">OFR</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Entrada Usina</label>
        <input id="entrada" type="datetime-local">
      </div>
      <div>
        <label>Chegada Área</label>
        <input id="chegada" type="datetime-local">
      </div>
    </div>

    <div class="button-group">
      <button class="normal" onclick="salvar('Normal')">Adicionar Normal</button>
      <button class="ofr" onclick="salvar('OFR')">Adicionar OFR</button>
    </div>

    <div class="small-actions">
      <button class="secondary" onclick="abrirPainelDaArea()">📺 Abrir Painel desta Área</button>
      <button class="secondary" onclick="abrirPainelGeral()">📋 Painel Geral</button>
      <button class="secondary" onclick="limparCampos()">🧹 Limpar Campos</button>
    </div>

    <div class="note">
      Dica: deixe este cadastro aberto no PC do controle e os painéis em outra aba/monitor (atualizam sozinhos).
    </div>
  </section>

  <section id="gerenciar">
    <div class="row">
      <div>
        <label>Filtrar por área</label>
        <select id="filtroArea" onchange="renderGerenciar()">
          <option value="">Todas</option>
          <option value="Trefila 1">Trefila 1</option>
          <option value="Pepa 1/2">Pepa 1/2</option>
          <option value="Trefila 2">Trefila 2</option>
          <option value="L3">L3</option>
          <option value="FAP">FAP</option>
          <option value="Galpão de lona">Galpão de lona</option>
          <option value="P. Bobinas">P. Bobinas</option>
        </select>
      </div>
      <div>
        <label>Ações</label>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="secondary" onclick="exportarJSON()">⬇ Exportar JSON</button>
          <button class="secondary" onclick="importarJSON()">⬆ Importar JSON</button>
          <button class="ofr" onclick="limparTudo()">🗑 Limpar Tudo</button>
        </div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Área</th>
          <th>Transporte</th>
          <th>Placa</th>
          <th>Chegada</th>
          <th>Entrada</th>
          <th>Tipo</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <div class="note">
      “Mover” é útil quando o veículo troca de frente. “Remover” retira do painel.
    </div>
  </section>
</div>

<div id="toast" class="toast"></div>

<script>
/** ====== CONFIG / API ====== **/
const API_URL = "/api/fila";

async function apiRequest(path = "", options = {}) {
  const res = await fetch(API_URL + path, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      ...(options.headers || {}),
    },
  });
  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch { data = null; }
  if (!res.ok) {
    const msg = data && data.error ? data.error : "Erro ao comunicar com o servidor.";
    throw new Error(msg);
  }
  return data;
}

async function loadAll(){
  const data = await apiRequest("");
  return Array.isArray(data) ? data : [];
}
async function addItem(payload){
  return apiRequest("", { method: "POST", body: JSON.stringify(payload) });
}
async function updateItem(id, payload){
  return apiRequest("/" + encodeURIComponent(id), { method: "PUT", body: JSON.stringify(payload) });
}
async function deleteItem(id){
  return apiRequest("/" + encodeURIComponent(id), { method: "DELETE" });
}
async function replaceAll(list){
  return apiRequest("", { method: "PUT", body: JSON.stringify(list) });
}
async function clearAll(){
  return apiRequest("", { method: "DELETE" });
}
function uid(){
  return String(Date.now()) + "_" + Math.random().toString(16).slice(2);
}
/** ====== UI ====== **/
const areaEl = document.getElementById("area");
const transporteEl = document.getElementById("transporte");
const placaEl = document.getElementById("placa");
const tipoEl = document.getElementById("tipo");
const entradaEl = document.getElementById("entrada");
const chegadaEl = document.getElementById("chegada");
const toastEl = document.getElementById("toast");

function showToast(msg, err=false){
  toastEl.textContent = msg;
  toastEl.className = "toast show" + (err ? " error" : "");
  setTimeout(()=> toastEl.className = "toast", 2800);
}
function openTab(e,id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");
  if(id==="gerenciar") renderGerenciar();
}

function limparCampos(){
  transporteEl.value="";
  placaEl.value="";
  // não limpa a área por padrão (pra agilizar)
  showToast("Campos limpos.");
}

function abrirPainelDaArea(){
  const area = areaEl.value;
  if(!area){ showToast("Selecione a área primeiro.", true); return; }
  window.open("Painel.html?area=" + encodeURIComponent(area), "_blank");
}
function abrirPainelGeral(){
  window.location.href = "Painel_geral.html";
}

/** ====== CADASTRO ====== **/
async function salvar(tipoForcado){
  const area = areaEl.value;
  const transporte = (transporteEl.value || "").trim();
  const placa = (placaEl.value || "").trim().toUpperCase();
  const entrada = entradaEl.value;
  const chegada = chegadaEl.value;
  const tipo = tipoForcado || tipoEl.value;

  if(!area || !transporte || !placa || !entrada || !chegada){
    showToast("Preencha todos os campos.", true);
    return;
  }

  try{
    await addItem({ area, transporte, placa, entrada, chegada, tipo });
    showToast("Cadastrado com sucesso!");
    transporteEl.value="";
    placaEl.value="";
  }catch(e){
    showToast("Erro ao salvar: " + e.message, true);
  }
}

/** ====== GERENCIAR ====== **/
async function renderGerenciar(){
  const filtro = document.getElementById("filtroArea").value;
  const tbody = document.getElementById("tbody");

  let all = [];
  try{
    all = await loadAll();
  }catch(e){
    tbody.innerHTML = `<tr><td colspan="7">Erro ao carregar</td></tr>`;
    showToast("Erro ao carregar: " + e.message, true);
    return;
  }

  const lista = all
    .filter(v => !filtro || v.area === filtro)
    .sort((a,b)=>{
      // OFR primeiro
      if(a.tipo==="OFR" && b.tipo!=="OFR") return -1;
      if(a.tipo!=="OFR" && b.tipo==="OFR") return 1;
      return new Date(a.chegada) - new Date(b.chegada);
    });

  if(!lista.length){
    tbody.innerHTML = `<tr><td colspan="7">Nenhum registro</td></tr>`;
    return;
  }

  tbody.innerHTML = lista.map(v => `
    <tr>
      <td>${esc(v.area)}</td>
      <td>${esc(v.transporte)}</td>
      <td><b>${esc(v.placa)}</b></td>
      <td>${fmtDT(v.chegada)}</td>
      <td>${fmtDT(v.entrada)}</td>
      <td>${esc(v.tipo)}</td>
      <td style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
        <button class="move" onclick="mover('${v.id}')">Mover</button>
        <button class="remove" onclick="remover('${v.id}')">Remover</button>
      </td>
    </tr>
  `).join("");
}
async function remover(id){
  if(!confirm("Retirar este veículo da lista?")) return;
  try{
    await deleteItem(id);
    renderGerenciar();
    showToast("Removido.");
  }catch(e){
    showToast("Erro ao remover: " + e.message, true);
  }
}

async function mover(id){
  const nova = prompt(
    "Mover para qual área?\n" +
    "1) Trefila 1\n2) Pepa 1/2\n3) Trefila 2\n4) L3\n5) FAP\n6) Galpão de lona\n7) P. Bobinas\n\n" +
    "Digite exatamente o nome da área:"
  );

  if(!nova) return;

  const areas = ["Trefila 1","Pepa 1/2","Trefila 2","L3","FAP","Galpão de lona","P. Bobinas"];
  if(!areas.includes(nova)){
    showToast("Área inválida. Digite exatamente como na lista.", true);
    return;
  }

  try{
    await updateItem(id, { area: nova });
    renderGerenciar();
    showToast("Movido para " + nova);
  }catch(e){
    showToast("Erro ao mover: " + e.message, true);
  }
}

/** ====== IMPORT/EXPORT ====== **/
async function exportarJSON(){
  try{
    const all = await loadAll();
    const data = JSON.stringify(all);
    const blob = new Blob([data], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "fila_backup.json";
    a.click();
    URL.revokeObjectURL(a.href);
  }catch(e){
    showToast("Erro ao exportar: " + e.message, true);
  }
}

function importarJSON(){
  const input = document.createElement("input");
  input.type="file";
  input.accept="application/json";
  input.onchange = async () => {
    const file = input.files && input.files[0];
    if(!file) return;
    const text = await file.text();
    try{
      const arr = JSON.parse(text);
      if(!Array.isArray(arr)) throw new Error("Formato inválido");

      const normalized = arr.map(v => ({
        id: v.id || uid(),
        area: v.area,
        transporte: v.transporte,
        placa: v.placa,
        entrada: v.entrada,
        chegada: v.chegada,
        tipo: v.tipo,
        createdAt: v.createdAt || Date.now()
      }));

      for(const v of normalized){
        if(!v.area || !v.transporte || !v.placa || !v.entrada || !v.chegada || !v.tipo){
          throw new Error("Itens faltando campos");
        }
      }

      await replaceAll(normalized);
      renderGerenciar();
      showToast("Importado com sucesso!");
    }catch(e){
      showToast("Erro ao importar: " + e.message, true);
    }
  };
  input.click();
}

async function limparTudo(){
  if(!confirm("ATENÇÃO: isso apaga todos os registros do sistema. Continuar?")) return;
  try{
    await clearAll();
    renderGerenciar();
    showToast("Tudo limpo.");
  }catch(e){
    showToast("Erro ao limpar: " + e.message, true);
  }
}

/** ====== HELPERS ====== **/
function fmtDT(v){
  try{
    if(!v) return "-";
    return new Date(v).toLocaleString("pt-BR");
  }catch{return "-";}
}
function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}

/** ====== DEFAULT DATETIME ====== **/
window.addEventListener("DOMContentLoaded",()=>{
  const n = new Date();
  n.setMinutes(n.getMinutes() - n.getTimezoneOffset());
  const v = n.toISOString().slice(0,16);
  entradaEl.value = v;
  chegadaEl.value = v;
});

setInterval(() => {
  const gerenciarAtivo = document.getElementById("gerenciar").classList.contains("active");
  if(gerenciarAtivo) renderGerenciar();
}, 5000);
</script>
</body>
</html>
